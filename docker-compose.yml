services:
  srs:
    image: ossrs/srs:5
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./srs.conf:/usr/local/srs/conf/docker.conf

  app:
    build: .
    restart: unless-stopped
    network_mode: host
    depends_on:
      - srs
    volumes:
      - app-data:/data
    environment:
      - SRS_API_URL=http://localhost:1985
      - SRS_RTMP_HOST=localhost
      - SRS_RTMP_PORT=1935
      - DB_PATH=/data/db.sqlite

volumes:
  app-data:
