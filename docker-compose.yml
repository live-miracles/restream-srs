services:
  srs:
    image: ossrs/srs:5
    restart: unless-stopped
    ports:
      - "8080:8080"       # HTTP + HLS
      - "1935:1935"       # RTMP (for direct testing)
      - "1985:1985"       # HTTP API
      - "10080:10080/udp" # SRT ingest
    volumes:
      - ./srs.conf:/usr/local/srs/conf/docker.conf
      - ./player:/usr/local/srs/objs/nginx/html/player
