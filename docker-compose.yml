services:
  srs:
    image: ossrs/srs:5
    restart: unless-stopped
    ports:
      - "1935:1935"         # RTMP input
      - "10080:10080/udp"   # SRT input
      - "1985:1985"         # SRS HTTP API
    volumes:
      - ./srs.conf:/usr/local/srs/conf/docker.conf

  app:
    build: .
    restart: unless-stopped
    ports:
      - "8080:8080"         # Web UI + REST API
    depends_on:
      - srs
    volumes:
      - app-data:/data
    environment:
      - SRS_API_URL=http://srs:1985
      - SRS_RTMP_HOST=srs
      - SRS_RTMP_PORT=1935
      - DB_PATH=/data/db.sqlite

volumes:
  app-data:
