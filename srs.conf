listen              1935;
max_connections     1000;
daemon              off;
srs_log_tank        console;

http_api {
    enabled         on;
    listen          1985;
}

http_server {
    enabled         on;
    listen          8080;
    dir             ./objs/nginx/html;
}

srt_server {
    enabled         on;
    listen          10080;
}

vhost __defaultVhost__ {
    http_hooks {
        enabled     on;
        on_publish  http://app:8080/api/srs/on_publish;
    }
}
