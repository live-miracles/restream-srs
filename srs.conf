listen              1935;
max_connections     1000;
daemon              off;
srs_log_tank        file;
srs_log_level       warn;
srs_log_file        ./objs/srs.log;

http_api {
    enabled         on;
    listen          1985;
}

srt_server {
    enabled         on;
    listen          10080;
}

vhost __defaultVhost__ {
    # srt_to_rtmp is OFF: SRS keeps SRT streams in the native SRT/MPEG-TS domain
    # instead of remuxing them into the RTMP layer (which jittered audio and
    # collapsed multi-track audio to one). The app pulls SRT inputs back via SRT
    # (preserving every audio track and clean timestamps) and RTMP inputs via
    # RTMP; the HLS preview is produced by the app's own ffmpeg, so SRS no longer
    # generates native HLS — hence no hls{} or http_server block here.
    srt {
        enabled     on;
        srt_to_rtmp off;
    }

    http_hooks {
        enabled     on;
        on_publish  http://localhost:8080/api/srs/on_publish;
    }
}
