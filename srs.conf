listen              1935;
max_connections     1000;
daemon              off;
srs_log_tank        file;
srs_log_level       warn;
srs_log_file        ./objs/srs.log;

http_api {
    enabled         on;
    listen          1985;
}

http_server {
    enabled         on;
    listen          8088;
    dir             ./objs/nginx/html;
}

srt_server {
    enabled         on;
    listen          10080;
}

vhost __defaultVhost__ {
    srt {
        enabled     on;
        srt_to_rtmp on;
    }

    # SRS natively remuxes RTMP -> HLS, copying the source AAC untouched. The
    # single-track preview plays this directly (proxied) instead of running a
    # per-preview ffmpeg transcode, which is what was breaking clean audio.
    # hls_dts_directly forces SRS to use the original DTS so audio timestamps
    # are preserved rather than recomputed from the AAC sample count.
    hls {
        enabled          on;
        hls_fragment     2;
        hls_window       10;
        hls_dispose      30;
        hls_path         ./objs/nginx/html;
        hls_m3u8_file    [app]/[stream].m3u8;
        hls_ts_file      [app]/[stream]-[seq].ts;
        hls_dts_directly on;
    }

    http_hooks {
        enabled     on;
        on_publish  http://localhost:8080/api/srs/on_publish;
    }
}
